name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Build
        run: |
          go build -o bin/keen ./cmd/jira-pp-cli-pp-cli/
          go build -o bin/keen-mcp ./cmd/jira-pp-cli-pp-mcp/

      - name: Test
        run: go test ./...

      - name: Cross-compile check
        run: |
          GOOS=linux GOARCH=arm64 go build -o /dev/null ./cmd/jira-pp-cli-pp-cli/
          GOOS=linux GOARCH=arm64 go build -o /dev/null ./cmd/jira-pp-cli-pp-mcp/
