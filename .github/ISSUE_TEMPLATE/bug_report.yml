name: Bug Report
description: Report a bug in Keen
labels: [bug]
body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: What happened?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: Minimal steps to reproduce the issue
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What did you expect to happen?
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Keen Version
      description: Output of `keen --version`
    validations:
      required: true
  - type: dropdown
    id: os
    attributes:
      label: OS / Architecture
      options:
        - macOS arm64
        - Linux amd64
        - Linux arm64
        - Other
    validations:
      required: true
  - type: dropdown
    id: product
    attributes:
      label: Atlassian Product
      options:
        - Jira Cloud
        - Confluence Cloud
        - Both
        - Other
    validations:
      required: true
