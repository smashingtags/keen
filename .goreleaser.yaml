version: 2
project_name: keen
changelog:
  disable: true
builds:
  - id: keen
    main: ./cmd/jira-pp-cli-pp-cli
    binary: keen
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w -X jira-pp-cli-pp-cli/internal/cli.version={{ .Version }}
    targets:
      - darwin_arm64
      - linux_amd64
      - linux_arm64
  - id: keen-mcp
    main: ./cmd/jira-pp-cli-pp-mcp
    binary: keen-mcp
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w
    targets:
      - darwin_arm64
      - linux_amd64
      - linux_arm64
archives:
  - formats: [tar.gz]
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
checksum:
  name_template: checksums.txt
brews:
  - name: keen
    repository:
      owner: smashingtags
      name: homebrew-tap
    homepage: "https://github.com/smashingtags/jira-pp-cli"
    description: "Complete Atlassian platform CLI with MCP server and SQLite sync"
    install: |
      bin.install "keen"
      bin.install "keen-mcp"
